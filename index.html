<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>かおスライム</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    h1 { font-size: 2rem; font-weight: 600; margin-bottom: 0.4rem; color: #222; }
    .subtitle { font-size: 0.9rem; color: #888; margin-bottom: 1.5rem; }
    #camera-section {
      position: relative;
      width: 320px;
      height: 240px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #ddd;
      background: #222;
      margin-bottom: 1.5rem;
    }
    #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
    #start-btn {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      padding: 10px 24px; border-radius: 10px; border: none;
      background: rgba(255,255,255,0.9); color: #222; font-size: 14px;
      cursor: pointer; font-weight: 500;
    }
    #start-btn:hover { background: #fff; }
    #slime-canvas { display: block; margin-bottom: 1.5rem; }
    #status-bar {
      width: 320px; background: #fff; border-radius: 12px; border: 1px solid #eee;
      padding: 14px 18px; margin-bottom: 1rem;
    }
    .level-label { font-size: 12px; color: #aaa; margin-bottom: 4px; }
    .level-display { font-size: 20px; font-weight: 600; color: #222; }
    .level-dots { display: flex; gap: 8px; margin-top: 10px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; background: #e0e0e0; transition: background 0.5s; }
    .dot.active { background: #5DCAA5; }
    .dot.hard { background: #888780; }
    .dot.soft { background: #F0997B; }
    #message { font-size: 14px; color: #666; text-align: center; min-height: 22px; margin-bottom: 1rem; }
    #action-btn {
      display: none; padding: 12px 32px; border-radius: 10px; border: 1px solid #ddd;
      background: #fff; color: #222; font-size: 15px; font-weight: 500; cursor: pointer;
      transition: background 0.2s;
    }
    #action-btn:hover { background: #f5f5f5; }
  </style>
</head>
<body>
  <h1>かおスライム</h1>
  <p class="subtitle">カメラで顔の硬さを検出してスライムに反映します</p>
  <div id="camera-section">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
    <button id="start-btn">カメラを起動する</button>
  </div>
  <canvas id="slime-canvas" width="200" height="160"></canvas>
  <div id="status-bar">
    <div class="level-label">顔の柔らかさ</div>
    <div class="level-display" id="level-text">検出中...</div>
    <div class="level-dots">
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>
  </div>
  <div id="message"></div>
  <button id="action-btn" onclick="handleAction()"></button>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script src="app.js" onerror="this.onerror=null;this.src='/static/app.js'"></script>
</body>
</html>
