<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>リラックス</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #e0f0f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    h1 { font-size: 1.6rem; font-weight: 600; color: #1a5a7a; margin-bottom: 0.5rem; }
    .subtitle { font-size: 0.9rem; color: #4a8aaa; margin-bottom: 2rem; }
    #canvas-wrap {
      position: relative;
      width: 280px; height: 280px;
      margin-bottom: 1.5rem;
    }
    #breath-canvas { display: block; }
    #center-text {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center; pointer-events: none;
    }
    #count-num { font-size: 2.4rem; font-weight: 700; color: #1a5a7a; line-height: 1; }
    #phase-sub { font-size: 0.85rem; color: #4a8aaa; margin-top: 4px; }
    #breath-phase { font-size: 1.4rem; font-weight: 700; color: #1a5a7a; margin-bottom: 0.4rem; min-height: 34px; }
    #breath-count { font-size: 0.85rem; color: #4a8aaa; margin-bottom: 1.5rem; }
    #progress-bar { width: 240px; height: 5px; background: #b0d8ee; border-radius: 3px; margin-bottom: 2rem; overflow: hidden; }
    #progress-fill { height: 100%; background: #3aacc8; border-radius: 3px; width: 0%; transition: width 0.1s linear; }
    #complete-msg { display: none; font-size: 1rem; color: #1a5a7a; font-weight: 600; margin-bottom: 1.5rem; text-align: center; }
    #back-btn { padding: 12px 32px; border-radius: 10px; border: 1px solid #3aacc8; background: #fff; color: #1a5a7a; font-size: 15px; font-weight: 500; cursor: pointer; }
    #back-btn:hover { background: #e0f0f8; }
  </style>
</head>
<body>
  <h1>😌 リラックスしましょう</h1>
  <p class="subtitle">深呼吸して顔の力を抜いてみてください</p>

  <div id="canvas-wrap">
    <canvas id="breath-canvas" width="280" height="280"></canvas>
    <div id="center-text">
      <div id="count-num"></div>
      <div id="phase-sub"></div>
    </div>
  </div>

  <div id="breath-phase">準備してください...</div>
  <div id="breath-count"></div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="complete-msg">お疲れさまでした！<br>気持ちが楽になりましたか？</div>
  <button id="back-btn" onclick="window.location.href='/'">← メインに戻る</button>

  <script>
    const canvas = document.getElementById('breath-canvas');
    const ctx = canvas.getContext('2d');
    const phaseEl = document.getElementById('breath-phase');
    const countEl = document.getElementById('breath-count');
    const fillEl = document.getElementById('progress-fill');
    const completeMsg = document.getElementById('complete-msg');
    const countNum = document.getElementById('count-num');
    const phaseSub = document.getElementById('phase-sub');

    const CX = 140, CY = 140;
    const CYCLES = 3;
    const PHASES = [
      { name: '吸って', duration: 4000, targetR: 125 },
      { name: '止めて', duration: 4000, targetR: 125 },
      { name: '吐いて', duration: 8000, targetR: 30  },
    ];

    let cycle = 0;
    let phaseIndex = 0;
    let currentR = 30;
    let waveTime = 0;
    let phaseStart = null;
    let phaseStartR = 50;
    let animId = null;

    function drawWaterRing(radius, time) {
      ctx.clearRect(0, 0, 280, 280);

      const ringWidths = [18, 12, 7];
      const alphas = [0.55, 0.35, 0.2];
      const offsets = [0, 8, 16];

      for (let ri = 0; ri < 3; ri++) {
        const rr = radius + offsets[ri];
        const pts = 80;

        ctx.beginPath();
        for (let i = 0; i <= pts; i++) {
          const angle = (i / pts) * Math.PI * 2;
          const wobble = Math.sin(angle * 4 + time * 1.2 + ri * 0.8) * 7
                       + Math.sin(angle * 7 - time * 0.9 + ri * 1.5) * 4
                       + Math.sin(angle * 2 + time * 0.5) * 4;
          const outerR = rr + ringWidths[ri] / 2 + wobble;
          const innerR = rr - ringWidths[ri] / 2 + wobble * 0.6;

          if (i === 0) {
            ctx.moveTo(CX + Math.cos(angle) * outerR, CY + Math.sin(angle) * outerR);
          } else {
            ctx.lineTo(CX + Math.cos(angle) * outerR, CY + Math.sin(angle) * outerR);
          }
        }
        for (let i = pts; i >= 0; i--) {
          const angle = (i / pts) * Math.PI * 2;
          const wobble = Math.sin(angle * 4 + time * 1.2 + ri * 0.8) * 7
                       + Math.sin(angle * 7 - time * 0.9 + ri * 1.5) * 4
                       + Math.sin(angle * 2 + time * 0.5) * 4;
          const innerR = rr - ringWidths[ri] / 2 + wobble * 0.6;
          ctx.lineTo(CX + Math.cos(angle) * innerR, CY + Math.sin(angle) * innerR);
        }
        ctx.closePath();

        const grad = ctx.createRadialGradient(CX - radius * 0.2, CY - radius * 0.2, 0, CX, CY, rr + ringWidths[ri]);
        grad.addColorStop(0, `rgba(180, 230, 255, ${alphas[ri]})`);
        grad.addColorStop(0.5, `rgba(58, 172, 200, ${alphas[ri]})`);
        grad.addColorStop(1, `rgba(26, 90, 122, ${alphas[ri] * 0.6})`);
        ctx.fillStyle = grad;
        ctx.fill();

        ctx.beginPath();
        for (let i = 0; i <= 15; i++) {
          const angle = -Math.PI * 0.75 + (i / 15) * Math.PI * 0.35;
          const wobble = Math.sin(angle * 4 + time * 1.2 + ri * 0.8) * 4;
          const r = rr + wobble;
          const x = CX + Math.cos(angle) * r;
          const y = CY + Math.sin(angle) * r;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = `rgba(255, 255, 255, 0.45)`;
        ctx.lineWidth = ringWidths[ri] * 0.4;
        ctx.lineCap = 'round';
        ctx.stroke();
      }
    }

    function easeInOut(t) {
      return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    }

    function runPhase() {
      if (cycle >= CYCLES) {
        phaseEl.textContent = '完了！';
        countEl.textContent = '';
        countNum.textContent = '';
        phaseSub.textContent = '';
        fillEl.style.width = '100%';
        completeMsg.style.display = 'block';
        drawWaterRing(currentR, waveTime);
        return;
      }

      const phase = PHASES[phaseIndex];
      phaseEl.textContent = phase.name;
      countEl.textContent = `${cycle + 1} / ${CYCLES} セット`;
      phaseStart = null;
      phaseStartR = currentR;

      function animate(ts) {
        if (!phaseStart) phaseStart = ts;
        const elapsed = ts - phaseStart;
        const progress = Math.min(elapsed / phase.duration, 1);
        const ease = easeInOut(progress);

        currentR = phaseStartR + (phase.targetR - phaseStartR) * ease;
        waveTime += 0.04;
        drawWaterRing(currentR, waveTime);

        const remaining = Math.ceil((phase.duration - elapsed) / 1000);
        countNum.textContent = remaining > 0 ? remaining : '';
        phaseSub.textContent = phase.name;

        const totalProgress = ((cycle * 3 + phaseIndex) / (CYCLES * 3)) + (progress / (CYCLES * 3));
        fillEl.style.width = (totalProgress * 100) + '%';

        if (progress < 1) {
          animId = requestAnimationFrame(animate);
        } else {
          phaseIndex++;
          if (phaseIndex >= PHASES.length) { phaseIndex = 0; cycle++; }
          setTimeout(runPhase, 200);
        }
      }
      animId = requestAnimationFrame(animate);
    }

    drawWaterRing(currentR, 0);
    setTimeout(runPhase, 800);
  </script>
</body>
</html>
